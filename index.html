// ========== LOGIN ==========
function LoginScreen({ onLogin, loading }) {
  const [email, setEmail] = React.useState('sarzheev.iv@gmail.com');
  const [password, setPassword] = React.useState('');
  return (
    <div className="min-h-screen flex items-center justify-center p-4" style={{background:'linear-gradient(135deg,#1d4ed8,#1e40af)'}}>
      <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <h1 className="text-3xl font-bold text-gray-900 mb-1 text-center">Управление контрактами</h1>
        <p className="text-gray-500 text-center mb-8">ГУП Московский метрополитен</p>
        <div className="space-y-5">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
              className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&onLogin(email,password)}
              className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Введите пароль"/>
          </div>
          <button onClick={()=>onLogin(email,password)} disabled={loading}
            className="w-full py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 disabled:opacity-50">
            {loading ? 'Загрузка...' : 'Войти'}
          </button>
        </div>
        <p className="text-xs text-gray-400 text-center mt-6">Система управления контрактами и финансами</p>
      </div>
    </div>
  );
}

function AddModal({ type, contracts, onClose }) {
  return (
    <div className="fixed inset-0 flex items-center justify-center z-50 p-4" style={{background:'rgba(0,0,0,0.5)'}}>
      <div className="bg-white rounded-xl max-w-md w-full p-6 shadow-2xl">
        <h3 className="text-lg font-semibold text-gray-900 mb-4">
          {type==='document'&&'Добавить документ'}
          {type==='task'&&'Создать задачу'}
          {type==='letter'&&'Добавить письмо'}
        </h3>
        <div className="space-y-4">
          <input type="text" placeholder="Название" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"/>

            <option>Выберите контракт</option>
            {contracts.map(c=><option key={c.id} value={c.id}>{c.name.substring(0,60)}</option>)}
          </select>
          <textarea placeholder="Описание / Содержание" rows="4" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"/>

            <button onClick={onClose} className="flex-1 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">Отмена</button>

          </div>
        </div>

  );
}

// ========== MAIN APP ==========
function App() {
  const [token, setToken] = React.useState(localStorage.getItem('token'));
  const [user, setUser] = React.useState(null);
  const [activeTab, setActiveTab] = React.useState('overview');
  const [selectedContract, setSelectedContract] = React.useState('all');
  const [searchQuery, setSearchQuery] = React.useState('');
  const [showAddModal, setShowAddModal] = React.useState(false);
  const [modalType, setModalType] = React.useState('');
  const [expandedContract, setExpandedContract] = React.useState(null);
  const [contracts, setContracts] = React.useState([]);
  const [tasks, setTasks] = React.useState([]);
  const [letters, setLetters] = React.useState([]);
  const [payments, setPayments] = React.useState([]);
  const [showPaymentForm, setShowPaymentForm] = React.useState(null); // contract_id
  const [newPayment, setNewPayment] = React.useState({amount:'', payment_date:'', purpose:''});
  const [editingPayment, setEditingPayment] = React.useState(null); // {id, amount, payment_date, purpose}
  const [objects, setObjects] = React.useState({}); // {contract_id: [...]}
  const [stages, setStages] = React.useState({}); // {contract_id: [...]}
  const [editingStage, setEditingStage] = React.useState(null);
  const [newStage, setNewStage] = React.useState({name:'', start_date:'', end_date:'', price:'', status:'в работе'});
  const [showStageForm, setShowStageForm] = React.useState(null);
  const [subcontracts, setSubcontracts] = React.useState([]);
  const [editingSubcontract, setEditingSubcontract] = React.useState(null);
  const [showSubcontractForm, setShowSubcontractForm] = React.useState(false);
  const [newSubcontract, setNewSubcontract] = React.useState({contract_ids:[], number:'', name:'', contractor:'', type:'ПИР', amount:'', start_date:'', end_date:'', status:'в работе'});
  const [editingObject, setEditingObject] = React.useState(null); // {id, name, status}
  const [newObject, setNewObject] = React.useState({name:'', status:'Проектирование'});
  const [showObjectForm, setShowObjectForm] = React.useState(null); // contract_id
  const [vatRate, setVatRate] = React.useState(20);
  const [editingVat, setEditingVat] = React.useState(false);
  const [vatInput, setVatInput] = React.useState('20');
  const [showNewContractForm, setShowNewContractForm] = React.useState(false);
  const [newContract, setNewContract] = React.useState({name:'', status:'Проектирование', progress:0, customer:'ГУП Московский метрополитен', contractor:'', contract_date:'', area:''});
  const [loading, setLoading] = React.useState(false);
  const [editingId, setEditingId] = React.useState(null);
  const [editData, setEditData] = React.useState({});

  const handleLogin = async (email, password) => {
    try {
      setLoading(true);
      const res = await fetch(`${API_URL}/auth/login`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email, password})
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        setToken(data.token); setUser(data.user);
        loadData(data.token);
      } else { alert('Ошибка: ' + data.error); }
    } catch(e) { alert('Ошибка подключения к серверу'); }
    finally { setLoading(false); }
  };

  const handleLogout = () => {
    localStorage.removeItem('token');
    setToken(null); setUser(null);
    setContracts([]); setTasks([]); setLetters([]);
  };

  const loadData = async (t=token) => {
    if (!t) return;
    try {
      setLoading(true);
      const h = {'Authorization':`Bearer ${t}`};
      const [cr,tr,lr,pr] = await Promise.all([
        fetch(`${API_URL}/contracts`,{headers:h}),
        fetch(`${API_URL}/tasks`,{headers:h}),
        fetch(`${API_URL}/letters`,{headers:h}),
        fetch(`${API_URL}/payments`,{headers:h})
      ]);
      if (cr.ok) setContracts(await cr.json());
      if (tr.ok) setTasks(await tr.json());
      if (lr.ok) setLetters(await lr.json());
      if (pr && pr.ok) setPayments(await pr.json());
      const sr = await fetch(`${API_URL}/subcontracts`, {headers:h});
      if (sr.ok) setSubcontracts(await sr.json());
    } catch(e) { console.error(e); }
    finally { setLoading(false); }
  };

  const handleUpdateContract = async (id, data) => {
    try {
      const res = await fetch(`${API_URL}/contracts/${id}`, {
        method:'PUT',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
        body: JSON.stringify(data)
      });
      const result = await res.json();
      if (res.ok) { await loadData(); setEditingId(null); }
      else alert('Ошибка: ' + result.error);
    } catch(e) { alert('Ошибка подключения'); }
  };

  const handleAddPayment = async (contract_id) => {
    try {
      const res = await fetch(`${API_URL}/payments`, {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
        body: JSON.stringify({...newPayment, contract_id})
      });
      const data = await res.json();
      if (res.ok) {
        setPayments(prev => [data.payment, ...prev]);
        setShowPaymentForm(null);
        setNewPayment({amount:'', payment_date:'', purpose:''});
      } else { alert('Ошибка: ' + data.error); }
    } catch(e) { alert('Ошибка подключения'); }
  };

  const handleDeletePayment = async (id) => {
    if (!confirm('Удалить платёж?')) return;
    try {
      const res = await fetch(`${API_URL}/payments/${id}`, {
        method:'DELETE',
        headers:{'Authorization':`Bearer ${token}`}
      });
      if (res.ok) setPayments(prev => prev.filter(p => p.id !== id));
    } catch(e) { alert('Ошибка'); }
  };

  const handleCreateContract = async () => {
    if (!newContract.name.trim()) return alert('Введите название контракта');
    try {
      const res = await fetch(`${API_URL}/contracts`, {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
        body: JSON.stringify(newContract)
      });
      const data = await res.json();
      if (res.ok) {
        await loadData();
        setShowNewContractForm(false);
        setNewContract({name:'', status:'Проектирование', progress:0, customer:'ГУП Московский метрополитен', contractor:'', contract_date:'', area:''});
      } else { alert('Ошибка: ' + data.error); }
    } catch(e) { alert('Ошибка подключения'); }
  };

  const handleSaveEditPayment = async () => {
    if (!editingPayment) return;
    try {
      const res = await fetch(`${API_URL}/payments/${editingPayment.id}`, {
        method:'PUT',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
        body: JSON.stringify({
          amount: editingPayment.amount,
          payment_date: editingPayment.payment_date,
          purpose: editingPayment.purpose
        })
      });
      const data = await res.json();
      if (res.ok) {
        setPayments(prev => prev.map(p => p.id === editingPayment.id ? data.payment : p));
        setEditingPayment(null);
      } else { alert('Ошибка: ' + data.error); }
    } catch(e) { alert('Ошибка подключения'); }
  };

  // ---- OBJECTS ----
  const loadObjects = async (contract_id) => {
    try {
      const res = await fetch(`${API_URL}/contracts/${contract_id}/objects`, {
        headers: {'Authorization': `Bearer ${token}`}
      });
      if (res.ok) {
        const data = await res.json();
        setObjects(prev => ({...prev, [contract_id]: data}));
      }
    } catch(e) { console.error(e); }
  };

  const handleAddObject = async (contract_id) => {
    if (!newObject.name.trim()) return alert('Введите название объекта');
    try {
      const res = await fetch(`${API_URL}/contracts/${contract_id}/objects`, {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
        body: JSON.stringify(newObject)
      });
      const data = await res.json();
      if (res.ok) {
        setObjects(prev => ({...prev, [contract_id]: [...(prev[contract_id]||[]), data.object]}));
        setNewObject({name:'', status:'Проектирование'});
        setShowObjectForm(null);
      } else { alert('Ошибка: ' + data.error); }
    } catch(e) { alert('Ошибка подключения'); }
  };

  const handleSaveEditObject = async () => {
    if (!editingObject) return;
    try {
      const res = await fetch(`${API_URL}/objects/${editingObject.id}`, {
        method:'PUT',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
        body: JSON.stringify({name: editingObject.name, status: editingObject.status})
      });
      const data = await res.json();
      if (res.ok) {
        setObjects(prev => {
          const updated = {};
          for (const cid in prev) {
            updated[cid] = prev[cid].map(o => o.id === editingObject.id ? data.object : o);
          }
          return updated;
        });
        setEditingObject(null);
      } else { alert('Ошибка: ' + data.error); }
    } catch(e) { alert('Ошибка подключения'); }
  };

  const handleDeleteObject = async (id, contract_id) => {
    if (!confirm('Удалить объект?')) return;
    try {
      const res = await fetch(`${API_URL}/objects/${id}`, {
        method:'DELETE',
        headers:{'Authorization':`Bearer ${token}`}
      });
      if (res.ok) setObjects(prev => ({...prev, [contract_id]: (prev[contract_id]||[]).filter(o=>o.id!==id)}));
    } catch(e) { alert('Ошибка'); }
  };


  // ---- STAGES ----
  const loadStages = async (contract_id) => {
    try {
      const res = await fetch(`${API_URL}/contracts/${contract_id}/stages`, {headers:{'Authorization':`Bearer ${token}`}});
      if (res.ok) { const data = await res.json(); setStages(prev => ({...prev, [contract_id]: data})); }
    } catch(e) {}
  };

  const handleAddStage = async (contract_id) => {
    if (!newStage.name.trim()) return alert('Введите название этапа');
    try {
      const res = await fetch(`${API_URL}/contracts/${contract_id}/stages`, {
        method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
        body: JSON.stringify({...newStage, contract_id})
      });
      const data = await res.json();
      if (res.ok) {
        setStages(prev => ({...prev, [contract_id]: [...(prev[contract_id]||[]), data.stage]}));
        setNewStage({name:'', start_date:'', end_date:'', price:'', status:'в работе'});
        setShowStageForm(null);
      } else { alert('Ошибка: ' + data.error); }
    } catch(e) { alert('Ошибка подключения'); }
  };

  const handleSaveEditStage = async () => {
    if (!editingStage) return;
    try {
      const res = await fetch(`${API_URL}/stages/${editingStage.id}`, {
        method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
        body: JSON.stringify(editingStage)
      });
      const data = await res.json();
      if (res.ok) {
        setStages(prev => {
          const upd = {};

                            <select value={editingSubcontract.type||'ПИР'} onChange={e=>setEditingSubcontract({...editingSubcontract,type:e.target.value})}
                              className="w-full px-3 py-2 border border-blue-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                              {['ПИР','СМР','Изыскания','Поставка материалов','Поставка оборудования','Авторский надзор','Прочее'].map(t=><option key={t}>{t}</option>)}
                            </select>
                          </div>
                          <div>
                            <label className="block text-xs font-medium text-gray-600 mb-1">Номер</label>
                            <input type="text" value={editingSubcontract.number||''} onChange={e=>setEditingSubcontract({...editingSubcontract,number:e.target.value})}
                              className="w-full px-3 py-2 border border-blue-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                          </div>
                          <div className="col-span-2">
                            <label className="block text-xs font-medium text-gray-600 mb-1">Название</label>
                            <input type="text" value={editingSubcontract.name||''} onChange={e=>setEditingSubcontract({...editingSubcontract,name:e.target.value})}
                              className="w-full px-3 py-2 border border-blue-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                          </div>
                          <div className="col-span-2">
                            <label className="block text-xs font-medium text-gray-600 mb-2">Контракты <span className="text-blue-500">(можно выбрать несколько)</span></label>
                            <div className="grid grid-cols-2 gap-2">
                              {contracts.map(c=>(
                                <label key={c.id} className={`flex items-start gap-2 p-2 rounded-lg border cursor-pointer text-xs transition ${(editingSubcontract.contract_ids||[]).includes(c.id)?'border-blue-500 bg-blue-100':'border-gray-200 hover:bg-gray-50'}`}>
                                  <input type="checkbox"
                                    checked={(editingSubcontract.contract_ids||[]).includes(c.id)}
                                    onChange={()=>setEditingSubcontract({...editingSubcontract, contract_ids: toggleContractId(editingSubcontract.contract_ids||[], c.id)})}
                                    className="mt-0.5 flex-shrink-0"/>
                                  <span className="text-gray-700 leading-tight">{c.name.substring(0,60)}...</span>
                                </label>
                              ))}
                            </div>
                          </div>
                          <div>
                            <label className="block text-xs font-medium text-gray-600 mb-1">Подрядчик</label>
                            <input type="text" value={editingSubcontract.contractor||''} onChange={e=>setEditingSubcontract({...editingSubcontract,contractor:e.target.value})}
                              className="w-full px-3 py-2 border border-blue-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                          </div>
                          <div>
                            <label className="block text-xs font-medium text-gray-600 mb-1">Сумма (руб.)</label>
                            <input type="number" value={editingSubcontract.amount||''} onChange={e=>setEditingSubcontract({...editingSubcontract,amount:e.target.value})}
                              className="w-full px-3 py-2 border border-blue-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                          </div>
                          <div>
                            <label className="block text-xs font-medium text-gray-600 mb-1">Дата начала</label>
                            <input type="date" value={editingSubcontract.start_date ? editingSubcontract.start_date.substring(0,10) : ''} onChange={e=>setEditingSubcontract({...editingSubcontract,start_date:e.target.value})}
                              className="w-full px-3 py-2 border border-blue-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                          </div>
                          <div>
                            <label className="block text-xs font-medium text-gray-600 mb-1">Дата окончания</label>
                            <input type="date" value={editingSubcontract.end_date ? editingSubcontract.end_date.substring(0,10) : ''} onChange={e=>setEditingSubcontract({...editingSubcontract,end_date:e.target.value})}
                              className="w-full px-3 py-2 border border-blue-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                          </div>
                          <div>
                            <label className="block text-xs font-medium text-gray-600 mb-1">Статус</label>
                            <select value={editingSubcontract.status||'в работе'} onChange={e=>setEditingSubcontract({...editingSubcontract,status:e.target.value})}
                              className="w-full px-3 py-2 border border-blue-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                              {['в работе','завершён','приостановлен','не начат','расторгнут'].map(s=><option key={s}>{s}</option>)}
                            </select>
                          </div>
                        </div>
                        <div className="flex gap-3">
                          <button onClick={handleSaveEditSubcontract} className="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm font-medium flex items-center gap-1"><IC.Save/> Сохранить</button>
                          <button onClick={()=>setEditingSubcontract(null)} className="px-5 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 text-sm font-medium">Отмена</button>
                        </div>
                      </div>
                    ) : (
                      <div key={s.id} className={`border rounded-xl p-4 hover:shadow-sm bg-white`}>
                        <div className="flex items-start justify-between">
                          <div className="flex-1">
                            <div className="flex items-center gap-2 mb-1 flex-wrap">
                              <span className={`px-2 py-0.5 rounded text-xs font-medium border ${getTypeColor(s.type)}`}>{s.type}</span>
                              <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${getStatusColor(s.status)}`}>{s.status}</span>
                              {s.number && <span className="text-xs text-gray-500">№ {s.number}</span>}
                            </div>
                            <h4 className="font-semibold text-gray-900">{s.name}</h4>
                            {s.contractor && <p className="text-sm text-gray-600 mt-1">Подрядчик: {s.contractor}</p>}
                            <p className="text-xs text-gray-500 mt-1">
                              {(s.contract_ids||[]).length > 0
                              ? (s.contract_ids||[]).map(cid => {
                                  const c = contracts.find(x=>x.id===cid);
                                  return c ? <span key={cid} className="inline-block bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded text-xs mr-1 mb-1">…{contractNum(c.name)}</span> : null;
                                })
                              : <span className="text-gray-400">Контракт не указан</span>
                            }
                            </p>
                          </div>
                          <div className="text-right ml-4 flex-shrink-0">
                            {s.amount && <p className="text-lg font-bold text-blue-600">{fmtM(s.amount)} млн. руб.</p>}
                            <p className="text-xs text-gray-500 mt-1">{s.start_date ? fmtDate(s.start_date) : '—'} → {s.end_date ? fmtDate(s.end_date) : '—'}</p>
                            <div className="flex gap-2 mt-2 justify-end">
                              <button onClick={()=>setEditingSubcontract({...s, contract_ids: (s.contract_ids||[]).map(Number)})} className="flex items-center gap-1 px-2 py-1 bg-blue-50 text-blue-600 rounded hover:bg-blue-100 text-xs"><IC.Edit2/> Изменить</button>
                              <button onClick={()=>handleDeleteSubcontract(s.id)} className="flex items-center gap-1 px-2 py-1 bg-red-50 text-red-500 rounded hover:bg-red-100 text-xs"><IC.Trash2/></button>
                            </div>
                          </div>
                        </div>
                      </div>
                    )
                  ))}
                </div>
              );
            })()}
          </div>
        )}
      {/* MODAL */}
      {showAddModal && <AddModal type={modalType} contracts={contracts} onClose={()=>setShowAddModal(false)}/>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
